services:
  - type: web
    name: fitnova-api
    env: docker
    dockerfilePath: Dockerfile.api
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fitnova-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: APP_ENV
        value: production

  - type: web
    name: fitnova-dashboard
    env: docker
    dockerfilePath: Dockerfile.dashboard
    startCommand: streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0
    plan: free
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: fitnova-api
          property: host

databases:
  - name: fitnova-db
    plan: free
    databaseName: fitnova_db
    user: postgres
