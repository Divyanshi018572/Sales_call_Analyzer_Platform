services:
  - type: web
    name: fitnova-api
    env: docker
    dockerfilePath: Dockerfile.api
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fitnova-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: APP_ENV
        value: production

  - type: web
    name: fitnova-dashboard
    env: docker
    dockerfilePath: Dockerfile.dashboard
    plan: free
    envVars:
      - key: API_URL
        value: https://fitnova-api-os8d.onrender.com

databases:
  - name: fitnova-db
    plan: free
    databaseName: fitnova_db
