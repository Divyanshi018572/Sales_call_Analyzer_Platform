version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fitnova_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass
      POSTGRES_DB: fitnova_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fitnova_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fitnova_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_secure_pass@db:5432/fitnova_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - APP_ENV=development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      # Avoid mounting host's python env if running locally
      - /app/.venv
      - /app/venv

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: fitnova_dashboard
    restart: always
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/.venv
      - /app/venv

volumes:
  pgdata:
